<header class="app-header">
    <nav class="navbar">
        <div class="logo" routerLink="/">
            <img src="logoRenovared.png" alt="RenovaRed">
        </div>

        <!-- Menu hamburguesa (solo en mobile) -->
        <button *ngIf="isMobile" class="hamburger" (click)="toggleMenu()" [class.active]="mobileMenuOpen">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Menú principal -->
        <div class="nav-links" [class.mobile-open]="mobileMenuOpen" [class.mobile-hidden]="isMobile && !mobileMenuOpen">
            <!-- Links para SI logueados -->
            <ng-container *ngIf="isAuthenticated">

               <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="onNavLinkClick()">Inicio</a>

                <a routerLink="/marketplace" routerLinkActive="active" class="nav-link" (click)="onNavLinkClick()">Marketplace</a>
                <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" (click)="onNavLinkClick()">Dashboard</a>
                <a routerLink="/chat" routerLinkActive="active" class="nav-link" (click)="onNavLinkClick()">Chat</a>
                <a routerLink="/maps" routerLinkActive="active" class="nav-link" (click)="onNavLinkClick()">Maps</a>
                
                <!-- Menú desplegable -->
                <div class="dropdown">
                    <button class="dropdown-toggle" (click)="toggleDropdown()">
                        <div class="user-avatar">
                            <img [src]="getAvatarSrc(userAvatar)" 
                                 alt="Avatar"
                                 (error)="handleAvatarError($event)">
                        </div>
                        <span class="user-name">{{ userName }}</span>
                        <i class="fa-solid fa-chevron-down" [class.rotated]="dropdownOpen"></i>
                    </button>
                    
                    <div class="dropdown-menu" *ngIf="dropdownOpen">
                        <a routerLink="/profile" class="dropdown-item" (click)="closeMenuAndDropdown()">
                            <i class="fa-regular fa-user"></i>
                            Mi perfil
                        </a>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item logout" (click)="logout()">
                            <i class="fa-solid fa-sign-out-alt"></i>
                            Cerrar sesión
                        </button>
                    </div>
                </div>
            </ng-container>

            <!-- Links para NO logueados -->
            <ng-container *ngIf="!isAuthenticated">
                <a routerLink="/materiales" routerLinkActive="active" class="nav-link" (click)="onNavLinkClick()">Materiales</a>
                <a routerLink="/login" routerLinkActive="active" class="nav-link" (click)="onNavLinkClick()">Inicia sesión</a>
                <a routerLink="/register" routerLinkActive="active" class="nav-link nav-link-primary" (click)="onNavLinkClick()">Registrarse</a>
            </ng-container>
        </div>
    </nav>
</header>
