<header class="app-header">
	<nav class="navbar">
		<div class="logo">
			<img routerLink="/" src="logoRenovared.png" alt="RenovaRed">
		</div>

		<div class="nav-links">
			<a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Inicio</a>
			<a routerLink="/marketplace" routerLinkActive="active" class="nav-link">Marketplace</a>
			<a routerLink="/profile" routerLinkActive="active" class="nav-link">Perfil</a>
			<a routerLink="/chat" routerLinkActive="active" class="nav-link">Chat</a>
			<!--<a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>-->
			<a *ngIf="!isAuthenticated" routerLink="/login" routerLinkActive="active" class="nav-link">Login</a>
			<a *ngIf="!isAuthenticated" routerLink="/register" routerLinkActive="active" class="nav-link register-link">Registro</a>
			<span *ngIf="isAuthenticated && userName" class="user-name">{{ userName }}</span>
			<button *ngIf="isAuthenticated" type="button" class="logout-btn" (click)="logout()">Salir</button>
		</div>
	</nav>
</header>
