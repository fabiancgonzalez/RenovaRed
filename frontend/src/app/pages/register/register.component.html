<div class="register-page">
            <a routerLink="/" class="logo">
                <img src="logoRenovared.png" alt="RenovaRed">
            </a>

            <!--    CARD REGISTER      -->
            <div class="register-card">
                <h1>Registrarse</h1>
                <form>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Correo Electrónico">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input [type]="showPassword ? 'text' : 'password'" placeholder="Contraseña">
                        <i class="fa-solid toggle-password" [class.fa-eye]="!showPassword" 
                        [class.fa-eye-slash]="showPassword" (click)="togglePassword()"></i>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Confirmar Contraseña">
                        <i class="fa-solid toggle-password" [class.fa-eye]="!showConfirmPassword" 
                        [class.fa-eye-slash]="showConfirmPassword" (click)="toggleConfirmPassword()"></i>
                    </div>
                    
                    <button type="submit" routerLink="/marketplace" >Registrar</button>
                </form>
            </div>
